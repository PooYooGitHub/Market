spring:
  application:
    name: market-auth
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      server-addr: 127.0.0.1:8849
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8849
        # 使用默认的public命名空间（不指定namespace）
        # 启用失败容错，即使注册失败也不影响启动
        fail-fast: false
        # 注册时使用的IP地址
        ip: 127.0.0.1
        # 心跳间隔和超时设置
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        ip-delete-timeout: 30000
        # 禁用gRPC，使用HTTP协议（Nacos 1.x兼容模式）
        naming-load-cache-at-start: "false"
        # 指定网络接口
        network-interface: ""
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8849
        # 使用默认的public命名空间
        file-extension: yml
        # 启用失败容错
        fail-fast: false
        timeout: 10000
        # 使用长轮询代替gRPC
        enable-remote-sync-config: false
        # 最大重试次数
        max-retry: 10
        # 配置长轮询超时时间
        config-long-poll-timeout: 46000
        # 配置重试时间
        config-retry-time: 2000
        username: nacos
        password: nacos
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    password:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

server:
  port: 8080


# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

