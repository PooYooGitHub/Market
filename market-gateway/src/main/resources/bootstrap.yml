spring:
  application:
    name: market-gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8849
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8849
        username: nacos
        password: nacos
        # 配置 Nacos 连接超时和重试
        naming-load-cache-at-start: true  # 启动时加载服务列表
        naming-polling-thread-count: 1  # 轮询线程数
        # 使用 HTTP 长轮询而不是 gRPC (避免超时)
        naming-use-endpoint-parsing-rule: false
        register-enabled: true
        heartbeat-interval: 5000  # 心跳间隔5秒
        timeout: 3000  # 超时时间3秒
      config:
        server-addr: 127.0.0.1:8849
        file-extension: yml
        username: nacos
        password: nacos
        timeout: 3000
    gateway:
      discovery:
        locator:
          enabled: true  # 启用服务发现路由
          lower-case-service-id: true
      routes:
        # 用户服务路由
        - id: market-service-user
          uri: lb://market-service-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        # 商品服务路由
        - id: market-service-product
          uri: lb://market-service-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        # 交易服务路由
        - id: market-service-trade
          uri: lb://market-service-trade
          predicates:
            - Path=/api/trade/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  # Redis 配置（用于验证 Token）
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    password:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

server:
  port: 9000  # Gateway使用9000端口

# Gateway 认证白名单配置
gateway:
  auth:
    white-list:
      - /api/user/login
      - /api/user/register
      - /api/product/list
      - /api/product/detail
      - /api/product/category
      - /feign

# 日志配置
logging:
  level:
    org.shyu.marketgateway: DEBUG
    org.springframework.cloud.gateway: INFO

