spring:
  application:
    name: market-gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        ip: 127.0.0.1
        # 配置 Nacos 连接超时和重试
        naming-load-cache-at-start: false  # 不加载本地缓存，避免使用过期IP
        naming-polling-thread-count: 1  # 轮询线程数
        # 强制使用 HTTP 而不是 gRPC
        use-only-site-interfaces: false
        register-enabled: true  # 重新启用服务注册
        heartbeat-interval: 5000  # 心跳间隔5秒
        timeout: 10000  # 增加超时时间到10秒
        # 禁用gRPC，使用HTTP
        grpc:
          enable: false
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        username: nacos
        password: nacos
        timeout: 10000  # 增加超时时间
        # 禁用gRPC，使用HTTP
        grpc:
          enable: false
    loadbalancer:
      cache:
        enabled: true
        ttl: 5s  # 服务实例缓存5秒，避免长时间缓存过期IP
        capacity: 256
    gateway:
      discovery:
        locator:
          enabled: true  # 启用服务发现路由
          lower-case-service-id: true
      routes:
        # 用户服务路由
        - id: market-service-user
          uri: lb://market-service-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        # 分类服务路由（独立配置，避免与商品路由冲突）
        - id: market-service-category
          uri: lb://market-service-product
          predicates:
            - Path=/api/product/category/**
          filters:
            - StripPrefix=2  # 去掉 /api/product，保留 /category/**

        # 商品服务路由
        - id: market-service-product
          uri: lb://market-service-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1

        # 交易服务路由
        - id: market-service-trade
          uri: lb://market-service-trade
          predicates:
            - Path=/api/trade/**
          filters:
            - StripPrefix=1

        # 支付服务路由（指向交易服务）
        - id: market-service-payment
          uri: lb://market-service-trade
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1

        # 文件服务路由
        - id: market-service-file
          uri: lb://market-service-file
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1

        # 消息服务路由
        - id: market-service-message
          uri: lb://market-service-message
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1

        # 信用服务路由 - credit
        - id: market-service-credit-api
          uri: lb://market-service-credit
          predicates:
            - Path=/api/credit/**
          filters:
            - StripPrefix=1

        # 信用服务路由 - evaluation
        - id: market-service-evaluation-api
          uri: lb://market-service-credit
          predicates:
            - Path=/api/evaluation/**
          filters:
            - StripPrefix=1

        # 仲裁服务路由
        - id: market-service-arbitration
          uri: lb://market-service-arbitration
          predicates:
            - Path=/api/arbitration/**
          filters:
            - StripPrefix=1

        # 争议协商服务路由
        - id: market-service-dispute
          uri: lb://market-service-arbitration
          predicates:
            - Path=/api/dispute/**
          filters:
            - StripPrefix=1

        # Feign内部接口路由 - 交易服务（不去前缀，直接转发）
        - id: feign-trade
          uri: lb://market-service-trade
          predicates:
            - Path=/feign/trade/**

        # Feign内部接口路由 - 商品服务（不去前缀，直接转发）
        - id: feign-product
          uri: lb://market-service-product
          predicates:
            - Path=/feign/product/**

        # Feign内部接口路由 - 用户服务（不去前缀，直接转发）
        - id: feign-user
          uri: lb://market-service-user
          predicates:
            - Path=/feign/user/**

  # Redis 配置（用于验证 Token）
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    password:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

server:
  port: 8100  # Gateway使用8100端口

# Gateway 认证白名单配置
gateway:
  auth:
    white-list:
      # 用户相关公开接口
      - /api/user/auth/login
      - /api/user/auth/register
      - /api/user/login
      - /api/user/register
      # 商品相关公开接口
      - /api/product/list
      - /api/product/detail/**
      - /api/product/category/**
      - /api/product/statistics
      # Feign内部调用
      - /feign/**

# 日志配置
logging:
  level:
    org.shyu.marketgateway: DEBUG
    org.springframework.cloud.gateway: INFO

