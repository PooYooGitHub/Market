server:
  port: 8103

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/market_message?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456789
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1

  # Redis配置 - 如果Redis未启动会自动跳过
  redis:
    host: localhost
    port: 6379
    password:
    database: 4
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# WebSocket 配置
websocket:
  path: /ws
  allowed-origins: http://localhost:5173

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: market-message-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: chat-message-consumer
    topic: chat-message-topic

# 日志配置
logging:
  level:
    org.shyu.marketservicemessage: INFO
    org.springframework.data.redis: WARN

