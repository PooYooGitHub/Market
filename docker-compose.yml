version: '3.8'

# 校园跳蚤市场平台 - 基础设施 Docker Compose 配置
# 包含: Nacos, MySQL, Redis, Elasticsearch, MinIO, RocketMQ

services:
  # ==================== Nacos 服务注册与配置中心 ====================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: market-nacos
    hostname: nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root123456
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - NACOS_AUTH_IDENTITY_KEY=nacos
      - NACOS_AUTH_IDENTITY_VALUE=nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./docker/nacos/logs:/home/nacos/logs
      - ./docker/nacos/data:/home/nacos/data
    depends_on:
      - mysql
    networks:
      - market-network
    restart: always

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0.32
    container_name: market-mysql
    hostname: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - TZ=Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --lower_case_table_names=1
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/conf:/etc/mysql/conf.d
      - ./docker/mysql/logs:/var/log/mysql
      - ./doc/SQL:/docker-entrypoint-initdb.d
    networks:
      - market-network
    restart: always

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7.0-alpine
    container_name: market-redis
    hostname: redis
    command: redis-server --appendonly yes --requirepass redis123456
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
      - ./docker/redis/conf/redis.conf:/etc/redis/redis.conf
    networks:
      - market-network
    restart: always

  # ==================== Elasticsearch 搜索引擎 ====================
  elasticsearch:
    image: elasticsearch:8.6.2
    container_name: market-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./docker/elasticsearch/data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/plugins:/usr/share/elasticsearch/plugins
    networks:
      - market-network
    restart: always

  # ==================== Kibana (ES可视化) ====================
  kibana:
    image: kibana:8.6.2
    container_name: market-kibana
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=zh-CN
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - market-network
    restart: always

  # ==================== MinIO 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: market-minio
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/minio/data:/data
    networks:
      - market-network
    restart: always

  # ==================== RocketMQ NameServer ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: market-rocketmq-namesrv
    hostname: rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    volumes:
      - ./docker/rocketmq/namesrv/logs:/home/rocketmq/logs
      - ./docker/rocketmq/namesrv/store:/home/rocketmq/store
    networks:
      - market-network
    restart: always

  # ==================== RocketMQ Broker ====================
  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: market-rocketmq-broker
    hostname: rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/conf/broker.conf
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    volumes:
      - ./docker/rocketmq/broker/logs:/home/rocketmq/logs
      - ./docker/rocketmq/broker/store:/home/rocketmq/store
      - ./docker/rocketmq/broker/conf/broker.conf:/home/rocketmq/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
    networks:
      - market-network
    restart: always

  # ==================== RocketMQ Dashboard ====================
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: market-rocketmq-dashboard
    hostname: rocketmq-dashboard
    ports:
      - "8180:8080"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
      - rocketmq.config.namesrvAddr=rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    networks:
      - market-network
    restart: always

  # ==================== Sentinel 控制台 ====================
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: market-sentinel
    hostname: sentinel
    ports:
      - "8858:8858"
    environment:
      - auth.username=sentinel
      - auth.password=sentinel
    networks:
      - market-network
    restart: always

  # ==================== Seata 分布式事务 ====================
  seata-server:
    image: seataio/seata-server:1.7.0
    container_name: market-seata
    hostname: seata-server
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - SEATA_IP=seata-server
      - SEATA_PORT=8091
      - STORE_MODE=db
      - SEATA_CONFIG_NAME=file:/seata-server/resources/application.yml
    volumes:
      - ./docker/seata/config:/seata-server/resources
    networks:
      - market-network
    restart: always

# ==================== 网络配置 ====================
networks:
  market-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== 卷配置 ====================
volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:
  minio-data:
  nacos-logs:
  nacos-data:
  rocketmq-namesrv-logs:
  rocketmq-namesrv-store:
  rocketmq-broker-logs:
  rocketmq-broker-store:

