<!DOCTYPE html>
<html>
<head>
    <title>登录测试</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>管理员登录测试</h1>
    <div>
        <label>用户名: <input type="text" id="username" value="admin"></label><br><br>
        <label>密码: <input type="password" id="password" value="123456"></label><br><br>
        <button onclick="testLogin()">测试登录</button>
    </div>
    <div id="result"></div>

    <script>
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = '<p>登录中...</p>';

            try {
                const response = await axios.post('http://localhost:8100/api/user/login', {
                    username: username,
                    password: password
                });

                console.log('登录响应:', response.data);

                if (response.data.code === 200) {
                    const userInfo = response.data.data.userInfo;
                    resultDiv.innerHTML = `
                        <h3>✅ 登录成功！</h3>
                        <p><strong>用户名:</strong> ${userInfo.username}</p>
                        <p><strong>昵称:</strong> ${userInfo.nickname}</p>
                        <p><strong>用户ID:</strong> ${userInfo.id}</p>
                        <p><strong>Token:</strong> ${response.data.data.token.substring(0, 20)}...</p>
                        <p><strong>角色:</strong> ${userInfo.roles || '暂未实现'}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `<p>❌ 登录失败: ${response.data.message}</p>`;
                }
            } catch (error) {
                console.error('登录错误:', error);
                if (error.response) {
                    resultDiv.innerHTML = `<p>❌ 登录失败: ${error.response.data.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p>❌ 网络错误: ${error.message}</p>`;
                }
            }
        }
    </script>
</body>
</html>
